name: Release

# Publish to npm when a v* tag is pushed, using npm trusted publishing (OIDC).
# No NPM_TOKEN secret: configure the package's "Trusted Publisher" on npmjs.com
# to this repo + workflow. Provenance is emitted automatically.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Node 24 bundles npm >= 11.5.1, which trusted publishing needs — no fragile
      # in-place `npm install -g npm@latest` (it can leave a broken sigstore dep).
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run package
      # Idempotent: skip if this version is already on the registry so a re-run
      # (or a hand-published first version) goes green instead of erroring.
      - name: Publish
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already published — skipping."
          else
            npm publish
          fi
