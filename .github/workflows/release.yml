name: Release

# Publish to npm when a v* tag is pushed, using npm trusted publishing (OIDC).
# No NPM_TOKEN secret: configure the package's "Trusted Publisher" on npmjs.com
# to this repo + workflow. Provenance is emitted automatically.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      # Trusted publishing needs npm >= 11.5.1 (newer than the bundled version).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run package
      - run: npm publish
